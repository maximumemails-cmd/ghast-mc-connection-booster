name: Build Ghast Installer
on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained single file)
        run: dotnet publish Ghast/Ghast.csproj -c Release -r win-x64 -p:PublishSingleFile=true --self-contained true -p:IncludeNativeLibrariesForSelfExtract=true -o publish

      - name: Install Inno Setup
        run: choco install innosetup -y

      - name: Build installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\Ghast.iss'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghast-Setup
          path: installer/Output/Ghast-Setup.exe
          if-no-files-found: error

      - name: Publish Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: installer/Output/Ghast-Setup.exe
