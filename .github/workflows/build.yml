name: Build Ghast Installer

on:
  push:
    branches: [ main ]
  workflow_dispatch:        # lets you rebuild on demand from the Actions tab

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up .NET 8 SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Publish (self-contained single file)
        run: >
          dotnet publish Ghast/Ghast.csproj
          -c Release -r win-x64 --self-contained true
          /p:PublishSingleFile=true
          /p:IncludeNativeLibrariesForSelfExtract=true
          /p:EnableCompressionInSingleFile=true

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Compile installer
        run: '& "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" "Ghast\installer\Ghast.iss"'

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: Ghast-Setup
          path: Ghast/dist/Ghast-Setup.exe
          if-no-files-found: error
